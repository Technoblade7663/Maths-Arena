<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maths Arena - Staff Application</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: #f1f5f9; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; }
    h1 { color: #38bdf8; text-align: center; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; background: #334155; border: 1px solid #475569; color: white; border-radius: 6px; box-sizing: border-box; }
    button { background: #38bdf8; color: #0f172a; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; }
    button:hover { background: #0ea5e9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Maths Arena Staff Application</h1>
    <form action="https://formsubmit.co/khantharsh671@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="New Maths Arena Staff Application!">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://technoblade7663.github.io/Maths-Arena/thanks.html">
      
      <label>Full Name</label>
      <input type="text" name="Name" required>
      
      <label>Age</label>
      <input type="number" name="Age" required>
      
      <label>Country</label>
      <input type="text" name="Country" required>
      
      <label>Discord Username</label>
      <input type="text" name="Discord" required>
      
      <label>Email</label>
      <input type="email" name="Email" required>
      
      <label>Why do you want to join Maths Arena staff?</label>
      <textarea name="Why join" rows="4" required></textarea>
      
      <label>Past Experience</label>
      <textarea name="Experience" rows="4" required></textarea>
      
      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
  </html>
